name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: noteverso_test
          POSTGRES_USER: noteverso_test
          POSTGRES_PASSWORD: noteverso_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run backend tests
        run: |
          cd backend
          ./mvnw clean test

      - name: Generate test coverage report
        run: |
          cd backend
          ./mvnw jacoco:report

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/noteverso-core/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  frontend-test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [lts/*]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
          cache-dependency-path: './frontend/web/pnpm-lock.yaml'

      - name: Install dependencies
        run: |
          cd frontend/web
          pnpm install --frozen-lockfile

      - name: Check code lint
        run: | 
          cd frontend/web
          pnpm lint

      - name: Build the project
        run: |
          cd frontend/web
          pnpm build

      - name: Verify build output
        shell: bash
        run: |
          if [ ! -d "frontend/web/dist" ]; then
            echo "Build failed: dist directory not found."
            exit 1
          else
            echo "Build succeeded! 🎉"
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Compose (dev)
        run: |
          cd docker/dev
          docker compose up -d
          sleep 10
          docker compose ps
          docker compose down

      - name: Build backend Docker image
        run: |
          cd backend
          docker build -t noteverso-backend:${{ github.sha }} .

      - name: Build frontend Docker image
        run: |
          cd frontend/web
          docker build -t noteverso-frontend:${{ github.sha }} .
