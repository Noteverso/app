version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: noteverso-postgres-test
    environment:
      POSTGRES_DB: noteverso_test
      POSTGRES_USER: noteverso_test
      POSTGRES_PASSWORD: noteverso_test_pass
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteverso_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: noteverso-redis-test
    command: redis-server --requirepass noteverso_redis_test
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: noteverso-minio-test
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: noteverso_test
      MINIO_ROOT_PASSWORD: noteverso_minio_test_pass
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    volumes:
      - minio_test_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    container_name: noteverso-mailpit-test
    ports:
      - "127.0.0.1:1026:1025"
      - "127.0.0.1:8026:8025"
    environment:
      MP_MAX_MESSAGES: 1000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_test_data:
  redis_test_data:
  minio_test_data:
