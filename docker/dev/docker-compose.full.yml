version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: noteverso-postgres-dev
    environment:
      POSTGRES_DB: noteverso_dev
      POSTGRES_USER: noteverso
      POSTGRES_PASSWORD: noteverso_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteverso"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noteverso-network

  redis:
    image: redis:7-alpine
    container_name: noteverso-redis-dev
    command: redis-server --requirepass noteverso_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noteverso-network

  minio:
    image: minio/minio:latest
    container_name: noteverso-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: noteverso_minio
      MINIO_ROOT_PASSWORD: noteverso_minio_dev_pass
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - noteverso-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: noteverso-mailpit-dev
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - noteverso-network

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: noteverso-backend-dev
    env_file:
      - .env.docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - noteverso-network

  frontend:
    build:
      context: ../../frontend/web
      dockerfile: Dockerfile
    container_name: noteverso-frontend-dev
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - noteverso-network

volumes:
  postgres_dev_data:
  redis_dev_data:
  minio_dev_data:

networks:
  noteverso-network:
    driver: bridge
