spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5433/noteverso_test
spring.datasource.username=noteverso_test
spring.datasource.password=noteverso_test_pass
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:db/schema.sql

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6380
spring.data.redis.password=noteverso_redis_test

# MinIO (S3)
oss.access-key=noteverso_test
oss.access-key-secret=noteverso_minio_test_pass
oss.end-point=http://localhost:9002
oss.bucket-name=noteverso-test
oss.is-https=N

# JWT
noteverso.jwt-secret=test_secret_key_change_in_production_min_256_bits_required_for_hs256_algorithm
noteverso.jwt-expiration-days=7
noteverso.dev-url=http://localhost:5173
noteverso.prod-url=http://localhost:5173

# Mail (test configuration)
MAIL_HOST=localhost
MAIL_PORT=1026
MAIL_USERNAME=test
MAIL_PASSWORD=test
MAIL_FROM=test@noteverso.com

# H2 Console (disabled for tests)
spring.h2.console.enabled=false

# Logging
spring.main.log-startup-info=false
spring.main.banner-mode=off

# Print SQL (optional, for debugging)
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl